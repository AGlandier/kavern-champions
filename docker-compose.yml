services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_TWITCH_PARENT: champions.ksomon.dev
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    expose:
      - "5000"
    volumes:
      - db_data:/app/data
    env_file:
      - .env.prod
    restart: unless-stopped

  bot:
    build: ./twitch-bot
    env_file:
      - .env.prod
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
